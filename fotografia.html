<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Una Fotografía</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #111;
      overflow: hidden;
    }

    .foto-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .foto-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: brightness(0.88) contrast(1.08) saturate(1.1);
      transition: transform 8s ease;
    }

    .foto-wrapper img:hover { transform: scale(1.04); }

    .foto-caption {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 50px 28px 22px;
      background: linear-gradient(transparent, rgba(0,0,0,0.72));
      color: #fff;
      font-family: 'Georgia', serif;
      font-size: 0.95rem;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="foto-wrapper">
    <img src="https://images.unsplash.com/photo-1529156069898-49953e39b3ac?w=960&h=640&fit=crop"
         alt="Una fotografía"/>
    <div class="foto-caption">Una fotografía — Universidad Industrial de Santander</div>
  </div>
</body>
</html>
